<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 黑色圆形背景（极客风） -->
  <circle cx="60" cy="60" r="54" fill="#0A0A0F" stroke="#00FF99" stroke-width="2" />
  
  <!-- 字母 R (类似 Rockstar 的粗犷风格) -->
  <path d="M35 85 L35 35 L60 35 Q70 35 70 45 Q70 55 60 55 L45 55 L60 85 L50 85 L35 55 L35 85 Z" 
        fill="#00FF99" />
  
  <!-- 星星 (位于 R 的右上角，与 R 分离但组合成标志) -->
  <polygon points="78,28 82,36 90,38 84,44 86,52 78,48 70,52 72,44 66,38 74,36 78,28" 
           fill="#00FF99" />
  
  <!-- 可选：给星星加微弱光晕 -->
  <polygon points="78,28 82,36 90,38 84,44 86,52 78,48 70,52 72,44 66,38 74,36 78,28" 
           fill="none" stroke="#00FF99" stroke-width="1" stroke-opacity="0.6" />
</svg>